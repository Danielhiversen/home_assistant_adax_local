name: Lint

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: psf/black@stable
        with:
          options: "--check --diff"
          version: "26.5.1"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install flake8
        run: pip install flake8==7.3.0
      - name: Run flake8
        run: flake8 .
